name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/icon-composer/skills/compose-app-icon/scripts
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: plugins/icon-composer/skills/compose-app-icon/scripts/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: pytest
        run: uv run pytest

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ty check
        run: uv run ty check
